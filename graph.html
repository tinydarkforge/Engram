    const container = document.getElementById('graph');
    const data = { nodes, edges };

    const options = {
      nodes: {
        shape: 'dot',
        font: {
          color: '#eee',
          size: 12
        },
        borderWidth: 2,
        shadow: true
      },
      edges: {
        color: { color: '#444', highlight: '#3498db' },
        smooth: { type: 'continuous' }
      },
      physics: {
        forceAtlas2Based: {
          gravitationalConstant: -50,
          centralGravity: 0.01,
          springLength: 100,
          springConstant: 0.08
        },
        maxVelocity: 50,
        solver: 'forceAtlas2Based',
        timestep: 0.35,
        stabilization: { iterations: 150 }
      },
      interaction: {
        hover: true,
        tooltipDelay: 100
      }
    };

    const network = new vis.Network(container, data, options);

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', function(e) {
      const query = e.target.value.toLowerCase();
      if (!query) {
        nodes.forEach(node => nodes.update({ id: node.id, opacity: 1 }));
        return;
      }

      nodes.forEach(node => {
        const match = node.label.toLowerCase().includes(query);
        nodes.update({
          id: node.id,
          opacity: match ? 1 : 0.2,
          font: { color: match ? '#fff' : '#555' }
        });

        if (match) {
          network.focus(node.id, { scale: 1.5, animation: true });
        }
      });
    });

    // Click to focus
    network.on('click', function(params) {
      if (params.nodes.length > 0) {
        network.focus(params.nodes[0], { scale: 1.5, animation: true });
      }
    });
  </script>
